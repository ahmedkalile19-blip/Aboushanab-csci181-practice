<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Home - Ahmed Aboushanab Portfolio</title>
  </head>

  <body>
    <header id="page-header">
      <a href="/" class="logo">

          src="./images/FullLogo.jpg"
          alt="web-logo"
          width="48px"
          height="48px"
        />
        <span>Ahmed Aboushanab</span>
      </a>
      <nav id="main-nav">
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="resume.html">Resume</a></li>

    <main>

    <form>
      <label for="user-name">
        Name:
        <input id="user-name" type="text" placeholder="enter name" />
      </label>
      <label for="user-email">
        Email:
        <input id="user-email" type="email" placeholder="rliam@gmail.com" />
      </label>
      <label for="user-message">
        Message:
        <textarea
          id="user-message"
          type="text"
          placeholder="Type here"
          maxlength="300"
        ></textarea>
      </label>
      <button type="submit">Submit</button>
    </form>
